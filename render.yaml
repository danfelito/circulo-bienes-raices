services:
  - type: web
    name: circulo-bienes-raices
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    headers:
      - path: /*
        headers:
          - key: X-Frame-Options
            value: DENY
          - key: X-Content-Type-Options
            value: nosniff
      - path: /assets/*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000