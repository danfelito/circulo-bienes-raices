services:
  - type: web
    name: circulo-bienes-raices-1
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: circulo-bienes-raices-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_NAME
        value: circulo_admin_session
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: circulo-bienes-raices-db
    plan: free
    databaseName: circulo_bienes_raices
    user: circulo_admin
